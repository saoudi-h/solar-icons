<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #1e1e1e;
    color: #e6e6e6;
    font-size: 13px;
  }
  body { padding: 16px; }
  h1 {
    font-size: 14px;
    font-weight: 600;
    margin: 0 0 4px;
    color: #fff;
    letter-spacing: 0.02em;
  }
  .subtitle {
    font-size: 11px;
    color: #888;
    margin-bottom: 12px;
  }
  .summary {
    font-size: 12px;
    color: #bbb;
    margin-bottom: 8px;
  }
  .rename-list {
    max-height: 320px;
    overflow-y: auto;
    border: 1px solid #2e2e2e;
    border-radius: 6px;
    background: #252525;
    margin-bottom: 12px;
  }
  .rename-row {
    display: grid;
    grid-template-columns: 1fr 16px 1fr;
    gap: 8px;
    padding: 7px 12px;
    border-bottom: 1px solid #2e2e2e;
    align-items: center;
  }
  .rename-row:last-child { border-bottom: none; }
  .rename-row .arrow { color: #555; text-align: center; font-size: 11px; }
  .rename-row .old, .rename-row .new {
    font-family: 'SF Mono', Menlo, monospace;
    font-size: 11px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .rename-row .old { color: #f87171; }
  .rename-row .new { color: #4ade80; }
  .empty {
    padding: 32px 16px;
    text-align: center;
    color: #777;
    font-size: 12px;
  }
  .actions {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
  }
  button {
    background: #2e2e2e;
    color: #e6e6e6;
    border: 1px solid #3e3e3e;
    border-radius: 4px;
    padding: 6px 16px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.1s, border-color 0.1s;
  }
  button:hover { background: #3e3e3e; }
  button.primary {
    background: #2563eb;
    border-color: #2563eb;
    color: #fff;
  }
  button.primary:hover { background: #1d4ed8; border-color: #1d4ed8; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  .progress-track {
    height: 3px;
    background: #2e2e2e;
    border-radius: 2px;
    overflow: hidden;
    margin-top: 10px;
  }
  .progress-bar {
    height: 100%;
    background: #2563eb;
    width: 0%;
    transition: width 0.2s ease;
  }
  .status {
    margin-top: 6px;
    font-size: 11px;
    color: #888;
    min-height: 14px;
  }
  .status.error { color: #f87171; }
  .status.done { color: #4ade80; }
</style>
</head>
<body>
  <h1>Solar Icon Renamer</h1>
  <div class="subtitle">Rename icon components per the V3 source-of-truth fix (issue #493).</div>
  <div class="summary" id="summary">Scanning document...</div>
  <div class="rename-list" id="list">
    <div class="empty">Scanning...</div>
  </div>
  <div class="actions">
    <button id="cancel">Cancel</button>
    <button id="apply" class="primary" disabled>Apply</button>
  </div>
  <div class="progress-track"><div class="progress-bar" id="bar"></div></div>
  <div class="status" id="status"></div>

<script>
  const list = document.getElementById('list');
  const summary = document.getElementById('summary');
  const applyBtn = document.getElementById('apply');
  const cancelBtn = document.getElementById('cancel');
  const status = document.getElementById('status');
  const bar = document.getElementById('bar');

  let renames = [];

  const escapeHtml = (s) =>
    String(s).replace(/[&<>"']/g, (c) => ({
      '&': '&amp;',
      '<': '&lt;',
      '>': '&gt;',
      '"': '&quot;',
      "'": '&#39;',
    })[c]);

  const renderList = () => {
    if (renames.length === 0) {
      list.innerHTML =
        '<div class="empty">No matching components found.<br>Nothing to rename.</div>';
      summary.textContent = '0 renames planned.';
      applyBtn.disabled = true;
      return;
    }
    list.innerHTML = renames
      .map(
        (r) =>
          '<div class="rename-row">' +
            '<span class="old" title="' + escapeHtml(r.oldName) + '">' + escapeHtml(r.oldName) + '</span>' +
            '<span class="arrow">&rarr;</span>' +
            '<span class="new" title="' + escapeHtml(r.newName) + '">' + escapeHtml(r.newName) + '</span>' +
          '</div>'
      )
      .join('');
    summary.textContent = renames.length + ' rename' + (renames.length === 1 ? '' : 's') + ' planned. Review the list, then click Apply.';
    applyBtn.disabled = false;
  };

  window.onmessage = (event) => {
    const msg = event.data.pluginMessage;
    if (!msg) return;
    if (msg.type === 'preview') {
      renames = msg.renames;
      renderList();
    } else if (msg.type === 'progress') {
      const pct = msg.total === 0 ? 100 : (msg.done / msg.total) * 100;
      bar.style.width = pct + '%';
      status.textContent = 'Renamed ' + msg.done + ' of ' + msg.total + '...';
      if (msg.error) {
        status.classList.add('error');
        status.textContent += ' (' + msg.error + ')';
      }
    } else if (msg.type === 'done') {
      bar.style.width = '100%';
      status.classList.remove('error');
      status.classList.add('done');
      status.textContent = 'Done. ' + msg.total + ' component' + (msg.total === 1 ? '' : 's') + ' renamed. You can close this window or undo via Cmd/Ctrl+Z.';
      applyBtn.disabled = true;
      applyBtn.textContent = 'Done';
    }
  };

  applyBtn.onclick = () => {
    applyBtn.disabled = true;
    applyBtn.textContent = 'Applying...';
    cancelBtn.disabled = true;
    parent.postMessage({ pluginMessage: { type: 'apply' } }, '*');
  };

  cancelBtn.onclick = () => {
    parent.postMessage({ pluginMessage: { type: 'cancel' } }, '*');
  };
</script>
</body>
</html>
