packages:
  - apps/*
  - packages/*

allowBuilds:
  '@parcel/watcher': true
  esbuild: true
  lmdb: false
  msgpackr-extract: false
  sharp: false
  svelte-preprocess: true
  unrs-resolver: true
  vue-demi: true
  '@tailwindcss/oxide': true
  better-sqlite3: true
enablePrePostScripts: true
minimumReleaseAge: 0

